{% extends "base.html" %}
{% block content %}
<h2>Edit Food Entry</h2>

<form method="POST">
    <label for="name">Food</label><br>
    <input type="text" id="name" name="name" value="{{ food[1] }}" required><br><br>

    <label for="notes">Notes / Recipe</label><br>
    <textarea id="notes" name="notes">{{ food[2] }}</textarea><br><br>

    <button type="submit">💾 Save changes</button>
</form>

<br>
<a href="{{ url_for('index') }}">⬅ Back to list</a>
{% endblock %}
