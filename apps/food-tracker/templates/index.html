{% extends "base.html" %}
{% block content %}
<p>
    <a href="{{ url_for('add') }}">➕ Add new food entry</a>
</p>

<table>
    <tr>
        <th>Food</th>
        <th>Notes / Recipe</th>
        <th>Actions</th>
    </tr>
    {% for food in foods %}
    <tr>
        <td>{{ food[1] }}</td>
        <td style="white-space: pre-line;">{{ food[2] if food[2] else "-" }}</td>
        <td>
            <a href="{{ url_for('edit', food_id=food[0]) }}">✏ Edit</a> |
            <a href="{{ url_for('delete', food_id=food[0]) }}" onclick="return confirm('Delete this entry?')">🗑 Delete</a>
        </td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
