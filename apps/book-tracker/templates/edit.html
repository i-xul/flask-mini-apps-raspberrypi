{% extends "base.html" %}
{% block content %}
<h2>Edit Book</h2>

<form method="POST">
    <label for="title">Title</label><br>
    <input type="text" id="title" name="title" value="{{ book[1] }}" required><br><br>

    <label for="author">Author</label><br>
    <input type="text" id="author" name="author" value="{{ book[2] }}" required><br><br>

    <label for="date_read">Date Read</label><br>
    <input type="date" id="date_read" name="date_read" value="{{ book[3] }}"><br><br>

    <button type="submit">💾 Save changes</button>
</form>

<br>
<a href="{{ url_for('index') }}">⬅ Back to list</a>
{% endblock %}
